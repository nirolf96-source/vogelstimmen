<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: linear-gradient(to bottom, #dff6e0, #ffffff);
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 40px;
  color: #2d6a4f;
}

.container {
  margin-top: 40px;
}

.card {
  display: inline-block;
  background: white;
  padding: 20px;
  margin: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 220px;
  border-radius: 15px;
  cursor: pointer;
}

.name {
  margin-top: 15px;
  font-size: 22px;
  font-weight: bold;
  color: #344e41;
}
</style>

</head>

<body>

<h1>Vogelstimmen 🐦</h1>

<div class="container">

  <div class="card">
    <img src="nachtigall.jpg" onclick="playSound('sound1')">
    <div class="name">Nachtigall</div>
    <audio id="sound1" src="nachtigall.mp3"></audio>
  </div>

  <div class="card">
    <img src="amsel.jpg" onclick="playSound('sound2')">
    <div class="name">Amsel</div>
    <audio id="sound2" src="amsel.mp3"></audio>
  </div>

  <div class="card">
    <img src="rotkehlchen.jpg" onclick="playSound('sound3')">
    <div class="name">Rotkehlchen</div>
    <audio id="sound3" src="rotkehlchen.mp3"></audio>
  </div>

</div>

<script>
function playSound(soundId) {

  // Alle Sounds stoppen
  let sounds = document.querySelectorAll("audio");
  sounds.forEach(function(sound) {
    sound.pause();
    sound.currentTime = 0;
  });

  // Gewählten Sound abspielen
  document.getElementById(soundId).play();
}
</script>

</body>
</html>
