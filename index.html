<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen lernen</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: linear-gradient(to bottom, #dff6e0, #ffffff);
  text-align: center;
}

h1 {
  margin-top: 50px;
  font-size: 40px;
  color: #2d6a4f;
}

.card {
  display: inline-block;
  background: white;
  padding: 25px;
  margin-top: 50px;
  border-radius: 25px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 300px;
  border-radius: 20px;
  cursor: pointer;
}

.name {
  margin-top: 20px;
  font-size: 26px;
  font-weight: bold;
  color: #344e41;
}
</style>

</head>

<body>

<h1>Vogelstimmen 🐦</h1>

<div class="card">
  <img src="nachtigall.jpg" onclick="playSound()">
  <div class="name">Nachtigall</div>
  <audio id="sound" src="nachtigall.mp3"></audio>
</div>

<script>
function playSound() {
  document.getElementById("sound").play();
}
</script>

</body>
</html>
